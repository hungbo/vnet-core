name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  server:
    name: Build Server (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Admin UI
        run: |
          cd admin
          npm ci
          npm run build
          mkdir -p ../backend/cmd/server/embed
          cp -r dist/* ../backend/cmd/server/embed/

      - name: Build Server (embed admin)
        run: |
          cd backend
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o vnet-server ./cmd/server

      - name: Generate checksum
        run: cd backend && sha256sum vnet-server > vnet-server.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: server
          path: |
            backend/vnet-server
            backend/vnet-server.sha256

  client:
    name: Build Client + Agent (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Agent
        run: |
          cd agent
          go build -ldflags="-s -w -H windowsgui" -o vnet-agent.exe ./main.go

      - name: Setup Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Client
        run: |
          cd client
          wails build -platform windows/amd64

      - name: Pack
        run: |
          mkdir dist
          copy client\build\bin\VNET.exe dist\
          copy agent\vnet-agent.exe dist\
          cd dist
          echo @echo off > install.bat
          echo title Cai dat VNET Agent >> install.bat
          echo echo Cai dat VNET Agent... >> install.bat
          echo start /wait vnet-agent.exe --install >> install.bat
          echo echo Hoan tat! >> install.bat
          echo pause >> install.bat

      - name: Create ZIP
        run: |
          cd dist
          tar -a -c -f ../vnet-client-windows-${{ github.ref_name }}.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: client
          path: vnet-client-windows-*.zip

  release:
    name: Create Release
    needs: [server, client]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vnet-server*
            vnet-client-windows-*.zip
          generate_release_notes: true
